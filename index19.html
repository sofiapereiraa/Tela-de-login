<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="style8.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="grid-container">
    <div class="coluna1">
    <br> 
    <br>
    <br>
<h1 class="colunaPrimaria"> Bem-vindo de volta !
</h1>
<p id="texto1"> Acesse sua conta e continue sua jornada</p>
<br>
<br>
<button class="botao">Entrar</button>
<br>


</div>
 
<div class="coluna2">
<h1 class="Parte2"> Cadastre-se </h1>
<p id="texto2"> Ainda não tem uma conta? Seu próximo passo começa aqui </p>
<div class="icons">
  <button class="icon-btn">
    <i class="fa-brands fa-google"></i>
  </button>

  <button class="icon-btn">
    <i class="fa-brands fa-github"></i>
  </button>

  <button class="icon-btn">
    <i class="fa-brands fa-facebook"></i>
  </button>
</div>

<P id="texto2"> ou use seu email para cadastro</P>

<br>
    <form id="contactForm">
  <label for="name"> Nome: </label>
  <input type="text" id="name" required maxlength="256">

  <label for="email">Email: </label>
  <input type="email" id="email" required maxlength="256">

  <label for="password"> Senha: </label>
  <input type="password" id="password" required>
  <br>
  <button type = "submit" class="botao2">Entrar</button>
<br>
</form>
</div>
</body>
</html>
